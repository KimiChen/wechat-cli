name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release (3.14)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install package and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build

      - name: Run release validation
        run: python scripts/prepare_release.py --tag "${GITHUB_REF_NAME}"

      - name: Build release artifacts
        run: python scripts/build_release_artifacts.py --outdir dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: github-release-assets
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.whl dist/*.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.whl dist/*.tar.gz dist/SHA256SUMS --generate-notes --verify-tag
          fi
